<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickCab - Book Your Ride</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

.header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
width:400px;
background:white;
padding:25px;
margin:40px auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#218838;
}

.price-box{
background:#eee;
padding:10px;
margin:10px 0;
border-radius:5px;
text-align:center;
font-size:18px;
}

.offer{
background:#ffc107;
color:black;
margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
QuickCab Booking
</div>

<div class="container">

<label>Pickup Location</label>
<input type="text" id="pickup" placeholder="Enter pickup location">

<label>Drop Location</label>
<input type="text" id="drop" placeholder="Enter destination">

<button onclick="calculateFare()">Check Estimated Fare</button>

<div id="fareSection" style="display:none">

<div class="price-box">
Estimated Fare: ₹ <span id="fare"></span>
</div>

<button onclick="bookRide()">Book at Estimated Price</button>

<label>Offer Your Price</label>
<input type="number" id="userPrice" placeholder="Enter your price">

<button class="offer" onclick="offerPrice()">Submit Offer</button>

</div>

</div>

<script>

function calculateFare(){

let base = 50;
let randomDistance = Math.floor(Math.random() * 15) + 5;
let price = base + (randomDistance * 12);

document.getElementById("fare").innerText = price;

document.getElementById("fareSection").style.display="block";

}

function bookRide(){

alert("Ride booked at estimated price! Driver will contact you.");

}

function offerPrice(){

let offer = document.getElementById("userPrice").value;

if(offer==""){
alert("Please enter your price");
return;
}

alert("Your offer of ₹"+offer+" has been sent to nearby drivers.");

}

</script>

</body>
</html>
